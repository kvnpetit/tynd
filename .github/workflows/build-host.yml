name: Build webview-host

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: windows-x64
            asset: webview-host-windows-x64.exe
            binary: packages/bunview/bin/windows-x64/webview-host.exe

          - runner: ubuntu-latest
            target: linux-x64
            asset: webview-host-linux-x64
            binary: packages/bunview/bin/linux-x64/webview-host

          - runner: ubuntu-24.04-arm
            target: linux-arm64
            asset: webview-host-linux-arm64
            binary: packages/bunview/bin/linux-arm64/webview-host

          - runner: macos-13
            target: macos-x64
            asset: webview-host-macos-x64
            binary: packages/bunview/bin/macos-x64/webview-host

          - runner: macos-latest
            target: macos-arm64
            asset: webview-host-macos-arm64
            binary: packages/bunview/bin/macos-arm64/webview-host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/bunview/host-rs

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          BUNVIEW_SKIP_BUILD: "1"

      - name: Build webview-host
        run: bun packages/bunview/scripts/build-host.ts
        env:
          BUNVIEW_TARGET: ${{ matrix.target }}
          BUNVIEW_SKIP_BUILD: "1"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
          tag_name: ${{ github.ref_name }}
