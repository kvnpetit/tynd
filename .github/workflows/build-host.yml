name: Release — build hosts & publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v0.1.0)"
        required: true

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: windows-latest
            target: windows-x64
            full_bin: target/release/vorn-full.exe
            lite_bin: target/release/vorn-lite.exe
            full_asset: vorn-full-windows-x64.exe
            lite_asset: vorn-lite-windows-x64.exe

          - runner: windows-11-arm
            target: windows-arm64
            full_bin: target/release/vorn-full.exe
            lite_bin: target/release/vorn-lite.exe
            full_asset: vorn-full-windows-arm64.exe
            lite_asset: vorn-lite-windows-arm64.exe

          - runner: ubuntu-latest
            target: linux-x64
            full_bin: target/release/vorn-full
            lite_bin: target/release/vorn-lite
            full_asset: vorn-full-linux-x64
            lite_asset: vorn-lite-linux-x64

          - runner: ubuntu-24.04-arm
            target: linux-arm64
            full_bin: target/release/vorn-full
            lite_bin: target/release/vorn-lite
            full_asset: vorn-full-linux-arm64
            lite_asset: vorn-lite-linux-arm64

          - runner: macos-13
            target: macos-x64
            full_bin: target/release/vorn-full
            lite_bin: target/release/vorn-lite
            full_asset: vorn-full-macos-x64
            lite_asset: vorn-lite-macos-x64

          - runner: macos-latest
            target: macos-arm64
            full_bin: target/release/vorn-full
            lite_bin: target/release/vorn-lite
            full_asset: vorn-full-macos-arm64
            lite_asset: vorn-lite-macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux system deps (cached)
        if: startsWith(matrix.runner, 'ubuntu')
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
          version: 1.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: vorn-rust-release
          key: ${{ matrix.target }}

      - name: cargo clippy (release)
        run: cargo clippy --release --workspace --all-targets -- -D warnings

      - name: Build vorn-full
        run: cargo build --release -p vorn-full

      - name: Build vorn-lite
        run: cargo build --release -p vorn-lite

      - name: Stage release assets
        shell: bash
        run: |
          cp "${{ matrix.full_bin }}" "${{ matrix.full_asset }}"
          cp "${{ matrix.lite_bin }}" "${{ matrix.lite_asset }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ matrix.full_asset }}
            ${{ matrix.lite_asset }}

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            ${{ matrix.full_asset }}
            ${{ matrix.lite_asset }}

  publish:
    name: Publish @vorn/cli + @vorn/core + @vorn/host
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Cache Bun global install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-cache-${{ runner.os }}-

      - name: Cache workspace node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            playground/*/node_modules
            benchmarks/*/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build @vorn/cli
        run: bun run build
        working-directory: packages/cli

      - name: Publish @vorn/cli
        run: npm publish --access public --provenance
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vorn/core
        run: npm publish --access public --provenance
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vorn/host
        run: npm publish --access public --provenance
        working-directory: packages/host
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
