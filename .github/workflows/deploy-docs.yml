name: Deploy docs

on:
  workflow_run:
    workflows: ["Release — build hosts & publish"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy docs to Cloudflare Workers
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun global install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-docs-${{ runner.os }}-${{ hashFiles('docs/bun.lock', 'bun.lock') }}
          restore-keys: bun-cache-docs-${{ runner.os }}-

      - name: Cache docs node_modules
        uses: actions/cache@v4
        with:
          path: |
            docs/node_modules
            node_modules
          key: docs-node-modules-${{ runner.os }}-${{ hashFiles('docs/bun.lock', 'bun.lock') }}
          restore-keys: docs-node-modules-${{ runner.os }}-

      - name: Cache Next.js incremental build
        uses: actions/cache@v4
        with:
          path: docs/.next/cache
          key: docs-next-${{ runner.os }}-${{ hashFiles('docs/bun.lock') }}-${{ hashFiles('docs/src/**/*.{ts,tsx,mdx}', 'docs/next.config.ts') }}
          restore-keys: |
            docs-next-${{ runner.os }}-${{ hashFiles('docs/bun.lock') }}-
            docs-next-${{ runner.os }}-

      - name: Install docs dependencies
        run: bun install --frozen-lockfile
        working-directory: docs

      - name: Build docs site
        run: bun run build
        working-directory: docs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          command: deploy
