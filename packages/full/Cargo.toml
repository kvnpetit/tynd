[package]
name    = "vorn-full"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "vorn-full"
path = "src/main.rs"

[dependencies]
vorn-host = { path = "../host-rs" }
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
mimalloc     = { version = "0.1", default-features = false }
flate2       = "1.0"
dirs         = "6"
tempfile     = "3.27.0"

