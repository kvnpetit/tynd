[package]
name    = "vorn-lite"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "vorn-lite"
path = "src/main.rs"

[dependencies]
vorn-host = { path = "../host-rs" }
rquickjs     = { version = "0.9", features = ["full"] }
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
mimalloc     = { version = "0.1", default-features = false }
tempfile = "3.27.0"
