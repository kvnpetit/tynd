[package]
name = "webview-host"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "webview-host"
path = "src/main.rs"

[dependencies]
wry = "0.55.0"
tao = "0.35.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
rfd = "0.17.2"
arboard = "3.6.1"
tray-icon = "0.22.0"
muda = "0.17.2"
global-hotkey = "0.7.0"
window-vibrancy = "0.7.1"
image = { version = "0.25.10", default-features = false, features = [
    "png",
    "ico",
] }
notify-rust = "4.14.0"
sysinfo = { version = "0.32", default-features = false, features = ["system", "disk", "network", "component", "user"] }
if-addrs = "0.13"
starship-battery = "0.10"     # Cross-platform battery (replaces 3 platform impls)
nusb = "0.1"                  # Pure-Rust USB (replaces lsusb/WMI/system_profiler)
mimalloc = { version = "0.1", default-features = false }  # Faster allocator (10-30% perf boost)

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Graphics_Dwm",
    "Win32_System_Com",
] }

[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[profile.release]
opt-level     = 3       # max speed (hot loops in monitor thread, JSON serde)
lto           = "fat"   # full link-time optimization across all crates
codegen-units = 1       # required for fat LTO to be effective
panic         = "abort" # no unwinding code, faster panics
strip         = true    # strip symbols → smaller binary
debug         = false
incremental   = false
